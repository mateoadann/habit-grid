services:
  backend:
    build: ./backend
    container_name: habit-grid-api
    restart: unless-stopped
    volumes:
      - sqlite-data:/app/data
    env_file:
      - .env
    environment:
      - JWT_SECRET=${JWT_SECRET}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: habit-grid-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64m

  caddy:
    image: caddy:2-alpine
    container_name: habit-grid-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    deploy:
      resources:
        limits:
          memory: 64m

volumes:
  sqlite-data:
  caddy_data:
  caddy_config:
