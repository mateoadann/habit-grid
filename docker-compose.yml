services:
  backend:
    build: ./backend
    container_name: habit-grid-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - sqlite-data:/app/data
    env_file:
      - .env
    environment:
      - JWT_SECRET=${JWT_SECRET}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: habit-grid-web
    restart: unless-stopped
    ports:
      - "3080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - default
      - npm_proxy

networks:
  npm_proxy:
    external: true

volumes:
  sqlite-data:
